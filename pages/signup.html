<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | WeddingHub</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<main class="auth-container">
    <section class="auth-left signup-visual">
        <a class="brand auth-brand" href="../index.html">
            <span class="brand-mark">W</span>
            <span>WeddingHub</span>
        </a>

        <div>
            <p class="eyebrow">Start beautifully</p>
            <h1>Create your wedding website in minutes.</h1>
            <p>
                Build a refined invitation page, collect RSVPs, and keep every
                guest response close at hand.
            </p>
        </div>
    </section>

    <section class="auth-right">
        <div class="auth-card">
            <p class="eyebrow">New account</p>
            <h2>Create Account</h2>

            <form id="signupForm">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="Your name" required>

                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>

                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create a password" required>

                <button type="submit">Create Account</button>
            </form>

            <p id="message"></p>

            <p class="auth-link">
                Already have an account?
                <a href="login.html">Login</a>
            </p>
        </div>
    </section>
</main>

<script>

document.getElementById("signupForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const user = {
        full_name: document.getElementById("fullName").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

    const response = await fetch(
        "http://localhost:8080/signup",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(user)
        }
    );

    if(response.ok){

        document.getElementById("message")
        .innerHTML = "Account created. Redirecting to login...";

        setTimeout(() => {
            window.location.href = "login.html";
        }, 1000);

    } else {

        document.getElementById("message")
        .innerHTML = "Unable to create account. Please try again.";

    }

});

</script>

</body>
</html>
