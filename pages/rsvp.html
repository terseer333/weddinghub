<!DOCTYPE html>
<html>
<head>
    <title>RSVP - WeddingHub</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<section class="rsvp-hero">

    <div class="rsvp-overlay">

        <h1>💌 RSVP</h1>

        <p>
            We can't wait to celebrate with you.
            Please let us know if you'll be attending.
        </p>

    </div>

</section>

<div class="rsvp-container">

    <form id="rsvpForm" class="rsvp-card">

        <input
            type="text"
            id="guestName"
            placeholder="Your Full Name"
            required>

        <input
            type="text"
            id="phone"
            placeholder="Phone Number"
            required>

        <select id="status" required>

            <option value="">
                Will you be joining us?
            </option>

            <option value="attending">
                Yes, I will attend
            </option>

            <option value="not attending">
                Sorry, I can't attend
            </option>

        </select>

        <input
            type="number"
            id="guestCount"
            placeholder="Number of Guests"
            min="1"
            value="1">

        <textarea
            id="message"
            placeholder="Leave a message for the couple">
        </textarea>

        <button type="submit">
            Submit RSVP
        </button>

        <p id="result"></p>

    </form>

</div>

<script>

document.getElementById("rsvpForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const rsvp = {
        guest_name: document.getElementById("guestName").value,
        phone: document.getElementById("phone").value,
        status: document.getElementById("status").value,
        guest_count: parseInt(document.getElementById("guestCount").value),
        message: document.getElementById("message").value
    };

    try {

        const response = await fetch(
            "http://localhost:8080/rsvp",
            {
                method: "POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body: JSON.stringify(rsvp)
            }
        );

        if(response.ok){

            document.getElementById("result")
                .innerText =
                "✅ RSVP Submitted Successfully";

            document.getElementById("rsvpForm")
                .reset();

        }

    } catch(err){

        document.getElementById("result")
            .innerText =
            "❌ Failed To Submit RSVP";

    }

});

</script>
</body>
</html>
