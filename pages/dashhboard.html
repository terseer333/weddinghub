<!DOCTYPE html>
<html>
<head>
    <title>RSVP</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<section class="hero">

    <h1>RSVP</h1>

    <form>

        <input type="text" placeholder="Full Name"><br><br>

        <input type="tel" placeholder="Phone Number"><br><br>

        <select>
            <option>Yes</option>
            <option>No</option>
            <option>Maybe</option>
        </select><br><br>

        <input type="number" placeholder="Number of Guests"><br><br>

        <textarea placeholder="Message to the couple"></textarea><br><br>

        <button class="btn">
            Submit RSVP
        </button>

    </form>

</section>

</body>
</html>
