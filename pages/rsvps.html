<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSVP Dashboard | WeddingHub</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<header class="app-header compact-app-header">
    <nav class="site-nav app-nav">
        <a class="brand" href="dashboard.html">
            <span class="brand-mark">W</span>
            <span>WeddingHub</span>
        </a>

        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a class="nav-button" href="create-event.html">New Wedding</a>
        </div>
    </nav>

    <section class="dashboard-hero">
        <div>
            <p class="eyebrow">Guest intelligence</p>
            <h1>RSVP Dashboard</h1>
            <p>Review responses, attendance counts, guest totals, and personal notes from invitees.</p>
        </div>
    </section>
</header>

<main class="app-shell">
    <section class="stats">
        <div class="stat-card">
            <span>Total Responses</span>
            <strong id="totalResponses">0</strong>
        </div>

        <div class="stat-card">
            <span>Attending</span>
            <strong id="attendingCount">0</strong>
        </div>

        <div class="stat-card">
            <span>Not Attending</span>
            <strong id="notAttendingCount">0</strong>
        </div>
    </section>

    <section class="section-heading compact-heading">
        <p class="eyebrow">Responses</p>
        <h2>Guest Responses</h2>
    </section>

    <section id="rsvpContainer" class="event-list"></section>
</main>

<script>

async function loadRSVPs() {

    try {

        const response =
            await fetch(
                "http://localhost:8080/rsvp/all"
            );

        const rsvps =
            await response.json();

        const container =
            document.getElementById("rsvpContainer");

        container.innerHTML = "";

        let attending = 0;
        let notAttending = 0;

        document.getElementById("totalResponses")
            .innerText = rsvps.length;

        rsvps.forEach(rsvp => {

            if(rsvp.status === "attending"){
                attending++;
            } else {
                notAttending++;
            }

            container.innerHTML += `
                <article class="event-card response-card">
                    <div class="response-icon">
                        <span>${rsvp.status === "attending" ? "Yes" : "No"}</span>
                    </div>

                    <div class="event-content">
                        <p class="eyebrow">Guest response</p>
                        <h2>${rsvp.guest_name}</h2>
                        <p><strong>Phone</strong> ${rsvp.phone}</p>
                        <p><strong>Status</strong> ${rsvp.status}</p>
                        <p><strong>Guests</strong> ${rsvp.guest_count}</p>
                        <p>${rsvp.message || "No message provided."}</p>
                    </div>
                </article>
            `;
        });

        document.getElementById("attendingCount")
            .innerText = attending;

        document.getElementById("notAttendingCount")
            .innerText = notAttending;

        if(rsvps.length === 0){

            container.innerHTML = `
                <div class="empty-state">
                    <h2>No RSVP responses yet</h2>
                    <p>Guest responses will appear here as soon as invitees submit the form.</p>
                </div>
            `;
        }

    } catch(error) {

        console.log(error);

    }

}

loadRSVPs();

</script>

</body>
</html>
