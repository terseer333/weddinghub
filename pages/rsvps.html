<!DOCTYPE html>
<html>
<head>
    <title>Wedding RSVP Dashboard</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<header class="dashboard-header">

    <h1>💌 RSVP Dashboard</h1>

    <p>
        View guest attendance and responses
    </p>

</header>

<section class="stats">

    <div class="stat-card">
        <h3>Total Responses</h3>
        <h1 id="totalResponses">0</h1>
    </div>

    <div class="stat-card">
        <h3>Attending</h3>
        <h1 id="attendingCount">0</h1>
    </div>

    <div class="stat-card">
        <h3>Not Attending</h3>
        <h1 id="notAttendingCount">0</h1>
    </div>

</section>

<h2 class="section-title">
    Guest Responses
</h2>

<div id="rsvpContainer"></div>

<script>

async function loadRSVPs() {

    try {

        const response =
            await fetch(
                "http://localhost:8080/rsvp/all"
            );

        const rsvps =
            await response.json();

        const container =
            document.getElementById("rsvpContainer");

        container.innerHTML = "";

        let attending = 0;
        let notAttending = 0;

        document.getElementById("totalResponses")
            .innerText = rsvps.length;

        rsvps.forEach(rsvp => {

            if(rsvp.status === "attending"){
                attending++;
            } else {
                notAttending++;
            }

            container.innerHTML += `
                <div class="event-card">

                    <div class="event-image">
                        💌
                    </div>

                    <div class="event-content">

                        <h2>
                            ${rsvp.guest_name}
                        </h2>

                        <p>
                            📞 ${rsvp.phone}
                        </p>

                        <p>
                            ✅ Status:
                            <strong>${rsvp.status}</strong>
                        </p>

                        <p>
                            👥 Guests:
                            ${rsvp.guest_count}
                        </p>

                        <p>
                            💬 ${rsvp.message}
                        </p>

                    </div>

                </div>
            `;
        });

        document.getElementById("attendingCount")
            .innerText = attending;

        document.getElementById("notAttendingCount")
            .innerText = notAttending;

        if(rsvps.length === 0){

            container.innerHTML = `
                <div class="empty-state">
                    <h2>No RSVP Responses Yet</h2>
                    <p>
                        Guest responses will appear here.
                    </p>
                </div>
            `;
        }

    } catch(error) {

        console.log(error);

    }

}

loadRSVPs();

</script>

</body>
</html>
