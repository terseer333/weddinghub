<!DOCTYPE html>
<html>
<head>
    <title>Login - WeddingHub</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="auth-container">

    <div class="auth-left">
        <h1>💍 WeddingHub</h1>

        <h2>Create Beautiful Wedding Memories</h2>

        <p>
            Plan your wedding, manage guests,
            track RSVPs and share beautiful
            invitations with one simple link.
        </p>
    </div>

    <div class="auth-right">

        <div class="auth-card">

            <h2>Welcome Back</h2>

            <form id="loginForm">

                <input
                    type="email"
                    id="email"
                    placeholder="Email Address"
                    required>

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required>

                <button type="submit">
                    Login
                </button>

            </form>

            <p id="message"></p>

            <p class="auth-link">
                Don't have an account?
                <a href="signup.html">Create Account</a>
            </p>

        </div>

    </div>

</div>

<script>

document.getElementById("loginForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const user = {
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value.trim()
    };

    const response = await fetch(
        "http://localhost:8080/login",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(user)
        }
    );

    if(response.ok){

        document.getElementById("message")
        .innerHTML = "✅ Login Successful";

        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 1000);

    } else {

        document.getElementById("message")
        .innerHTML = "❌ Invalid Email or Password";

    }

});

</script>

</body>
</html>
