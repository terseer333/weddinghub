<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | WeddingHub</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<main class="auth-container">
    <section class="auth-left">
        <a class="brand auth-brand" href="../index.html">
            <span class="brand-mark">W</span>
            <span>WeddingHub</span>
        </a>

        <div>
            <p class="eyebrow">Welcome back</p>
            <h1>Return to your wedding command center.</h1>
            <p>
                Manage invitations, photos, RSVP responses, and guest details
                from one elegant planning dashboard.
            </p>
        </div>
    </section>

    <section class="auth-right">
        <div class="auth-card">
            <p class="eyebrow">Secure access</p>
            <h2>Login</h2>

            <form id="loginForm">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>

                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>

                <button type="submit">Login</button>
            </form>

            <p id="message"></p>

            <p class="auth-link">
                Don't have an account?
                <a href="signup.html">Create Account</a>
            </p>
        </div>
    </section>
</main>

<script>

document.getElementById("loginForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const user = {
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value.trim()
    };

    const response = await fetch(
        "http://localhost:8080/login",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(user)
        }
    );

    if(response.ok){

        document.getElementById("message")
        .innerHTML = "Login successful. Opening dashboard...";

        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 1000);

    } else {

        document.getElementById("message")
        .innerHTML = "Invalid email or password.";

    }

});

</script>

</body>
</html>
